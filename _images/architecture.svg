<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 710" width="820" height="710" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- ═══ Entry point ═══ -->
  <rect x="210" y="12" width="400" height="52" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="410" y="33" text-anchor="middle" font-weight="bold" font-size="13" fill="#1e3a5f">mesoSPIM_Control.py  (entry point)</text>
  <text x="410" y="51" text-anchor="middle" font-size="11" fill="#374151">Loads config &#x2192; creates QApplication &#x2192; creates MainWindow</text>

  <!-- Arrow: entry → GUI thread -->
  <line x1="410" y1="64" x2="410" y2="100" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="418" y="87" font-size="10" fill="#6b7280">instantiates</text>

  <!-- ═══ GUI thread (main thread) ═══ -->
  <rect x="15" y="104" width="790" height="116" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="24" y="122" font-weight="bold" font-size="12" fill="#1d4ed8">GUI thread  (main Qt thread)</text>

  <!-- MainWindow sub-box -->
  <rect x="35" y="130" width="390" height="76" rx="4" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
  <text x="230" y="149" text-anchor="middle" font-weight="bold" font-size="12" fill="#111827">mesoSPIM_MainWindow</text>
  <text x="230" y="165" text-anchor="middle" font-size="11" fill="#374151">&#x2022; hosts all GUI sub-windows (Camera, AcqManager …)</text>
  <text x="230" y="181" text-anchor="middle" font-size="11" fill="#374151">&#x2022; creates Core, then moves it to core_thread</text>
  <text x="230" y="197" text-anchor="middle" font-size="11" fill="#374151">&#x2022; emits signals; slots in Core execute in core_thread</text>

  <!-- StateSingleton badge -->
  <rect x="440" y="130" width="350" height="76" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="615" y="149" text-anchor="middle" font-weight="bold" font-size="12" fill="#713f12">mesoSPIM_StateSingleton</text>
  <text x="615" y="165" text-anchor="middle" font-size="11" fill="#713f12">QMutex-protected singleton dict.</text>
  <text x="615" y="181" text-anchor="middle" font-size="11" fill="#713f12">Holds all hardware &amp; acquisition state</text>
  <text x="615" y="197" text-anchor="middle" font-size="11" fill="#713f12">(laser, camera, ETL, galvo, positions …)</text>

  <!-- Arrow: GUI thread → Core thread -->
  <line x1="410" y1="220" x2="410" y2="258" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="418" y="244" font-size="10" fill="#6b7280">moveToThread(core_thread)</text>

  <!-- ═══ Core thread ═══ -->
  <rect x="15" y="262" width="790" height="292" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="24" y="281" font-weight="bold" font-size="12" fill="#15803d">Core thread  (highest-priority QThread)</text>

  <!-- mesoSPIM_Core sub-box -->
  <rect x="35" y="290" width="340" height="246" rx="4" fill="#ffffff" stroke="#86efac" stroke-width="1"/>
  <text x="205" y="310" text-anchor="middle" font-weight="bold" font-size="12" fill="#111827">mesoSPIM_Core  ("pacemaker")</text>
  <text x="205" y="328" text-anchor="middle" font-size="11" fill="#374151">&#x2022; sequences all hardware events</text>
  <text x="205" y="344" text-anchor="middle" font-size="11" fill="#374151">&#x2022; emits signals to Serial &amp; WaveFormer</text>
  <text x="205" y="360" text-anchor="middle" font-size="11" fill="#374151">&#x2022; spawns Camera &amp; ImageWriter QThreads</text>
  <text x="205" y="376" text-anchor="middle" font-size="11" fill="#374151">&#x2022; controls shutters &amp; laser enabler directly</text>

  <!-- mesoSPIM_WaveFormGenerator sub-box -->
  <rect x="390" y="290" width="395" height="116" rx="4" fill="#ffffff" stroke="#86efac" stroke-width="1"/>
  <text x="588" y="310" text-anchor="middle" font-weight="bold" font-size="12" fill="#111827">mesoSPIM_WaveFormGenerator</text>
  <text x="588" y="328" text-anchor="middle" font-size="11" fill="#374151">&#x2022; generates ETL ramps, galvo drive,</text>
  <text x="588" y="344" text-anchor="middle" font-size="11" fill="#374151">&#x00a0;&#x00a0;laser modulation analog waveforms</text>
  <text x="588" y="360" text-anchor="middle" font-size="11" fill="#374151">&#x2022; blocking NI-DAQ calls run here</text>
  <text x="588" y="378" text-anchor="middle" font-size="10" fill="#9ca3af">moveToThread(core_thread) on startup</text>

  <!-- mesoSPIM_Serial sub-box -->
  <rect x="390" y="420" width="395" height="116" rx="4" fill="#ffffff" stroke="#86efac" stroke-width="1"/>
  <text x="588" y="440" text-anchor="middle" font-weight="bold" font-size="12" fill="#111827">mesoSPIM_Serial</text>
  <text x="588" y="458" text-anchor="middle" font-size="11" fill="#374151">&#x2022; drives stages, filter wheels, zoom body</text>
  <text x="588" y="474" text-anchor="middle" font-size="11" fill="#374151">&#x2022; synchronous serial / USB I/O</text>
  <text x="588" y="490" text-anchor="middle" font-size="11" fill="#374151">&#x2022; stage position polled via QTimer</text>
  <text x="588" y="508" text-anchor="middle" font-size="10" fill="#9ca3af">moveToThread(core_thread) on startup</text>

  <!-- Arrow: Core thread → QThreads -->
  <line x1="205" y1="554" x2="205" y2="594" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="213" y="579" font-size="10" fill="#6b7280">spawns QThreads</text>

  <!-- ═══ Camera thread ═══ -->
  <rect x="15" y="598" width="380" height="96" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="205" y="618" text-anchor="middle" font-weight="bold" font-size="12" fill="#4c1d95">mesoSPIM_Camera</text>
  <text x="205" y="634" text-anchor="middle" font-size="11" fill="#6b7280">(high-priority QThread)</text>
  <text x="205" y="650" text-anchor="middle" font-size="11" fill="#374151">&#x2022; arms camera, triggers exposures</text>
  <text x="205" y="666" text-anchor="middle" font-size="11" fill="#374151">&#x2022; pushes raw frames into frame_queue</text>
  <text x="205" y="682" text-anchor="middle" font-size="11" fill="#374151">&#x2022; signals ImageWriter per frame</text>

  <!-- Arrow Camera → ImageWriter -->
  <line x1="395" y1="646" x2="425" y2="646" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="410" y="640" text-anchor="middle" font-size="10" fill="#6b7280">frames</text>

  <!-- ═══ ImageWriter thread ═══ -->
  <rect x="425" y="598" width="380" height="96" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="615" y="618" text-anchor="middle" font-weight="bold" font-size="12" fill="#4c1d95">mesoSPIM_ImageWriter</text>
  <text x="615" y="634" text-anchor="middle" font-size="11" fill="#6b7280">(high-priority QThread)</text>
  <text x="615" y="650" text-anchor="middle" font-size="11" fill="#374151">&#x2022; drains frame_queue, writes to disk</text>
  <text x="615" y="666" text-anchor="middle" font-size="11" fill="#374151">&#x2022; TIFF / HDF5 / OME-ZARR output</text>
  <text x="615" y="682" text-anchor="middle" font-size="11" fill="#374151">&#x2022; supports custom writer plugins</text>
</svg>
